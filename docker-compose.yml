version: "3.9"

services:
  token_maintain:
    build: .
    container_name: codex_token_maintain
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Data volume for config, tokens, logs, etc.
      - token_data:/data
      # To mount your age private key directly from host, uncomment the line below:
      # - /etc/age/token-sync.key:/data/age.key:ro
    environment:
      SCHEDULE_HOURS: "1"
      CONFIG_FILE: /data/config.json
      PORT: "8000"

volumes:
  token_data:
