<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codex token 维护中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #30363d;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-dim: rgba(59,130,246,.15);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --mute: #8b949e;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --radius: 10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    a{color:var(--accent);text-decoration:none}
    /* ---- layout ---- */
    header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
    .logo{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
    .logo svg{width:22px;height:22px;flex-shrink:0}
    .badge{font-size:.68rem;padding:2px 7px;border-radius:99px;background:var(--accent-dim);color:var(--accent);font-weight:600}
    main{flex:1;display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 57px)}
    aside{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:20px 0}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 22px;cursor:pointer;font-size:.9rem;color:var(--mute);transition:.15s;border-left:3px solid transparent}
    .nav-item:hover{color:var(--text);background:var(--surface2)}
    .nav-item.active{color:var(--accent);background:var(--accent-dim);border-left-color:var(--accent)}
    .nav-icon{width:17px;height:17px;flex-shrink:0}
    section.page{display:none;overflow-y:auto;padding:28px 32px;flex-direction:column;gap:24px}
    section.page.active{display:flex}
    /* ---- cards ---- */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px}
    .card-title{font-size:.8rem;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
    /* ---- stat grid ---- */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
    .stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:4px}
    .stat-label{font-size:.75rem;color:var(--mute);font-weight:500}
    .stat-value{font-size:1.9rem;font-weight:700;line-height:1}
    .ok{color:var(--green)}.warn{color:var(--yellow)}.err{color:var(--red)}.acc{color:var(--accent)}
    /* ---- button ---- */
    button{cursor:pointer;font-family:inherit;font-size:.875rem;border:none;border-radius:7px;padding:9px 18px;font-weight:500;transition:.15s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:disabled{opacity:.5;cursor:default}
    .btn-ghost{background:transparent;color:var(--mute);border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);border-color:var(--mute)}
    .btn-row{display:flex;gap:10px;align-items:center;margin-bottom:6px}
    /* ---- form ---- */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    label{font-size:.8rem;color:var(--mute);font-weight:500}
    input,select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.875rem;font-family:inherit;padding:8px 12px;outline:none;transition:.15s;width:100%}
    input:focus,select:focus{border-color:var(--accent)}
    input[type=checkbox]{width:auto;accent-color:var(--accent)}
    .checkbox-row{display:flex;align-items:center;gap:10px;padding:8px 0}
    /* ---- table ---- */
    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
    table{width:100%;border-collapse:collapse;font-size:.86rem}
    thead{background:var(--surface2)}
    th{padding:10px 14px;text-align:left;color:var(--mute);font-weight:600;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    td{padding:10px 14px;border-top:1px solid var(--border);white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis}
    tr:hover td{background:var(--surface2)}
    /* ---- log ---- */
    .log-box{background:#0a0e14;border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:'Courier New',monospace;font-size:.8rem;line-height:1.7;overflow-y:auto;height:380px;color:#c9d1d9;white-space:pre-wrap;word-break:break-all}
    .log-ts{color:var(--accent-hover)}
    /* ---- pill status ---- */
    .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.75rem;font-weight:600}
    .pill-ok{background:rgba(34,197,94,.15);color:#22c55e}
    .pill-401{background:rgba(239,68,68,.15);color:#ef4444}
    .pill-402{background:rgba(234,179,8,.15);color:#eab308}
    .pill-skip{background:rgba(100,116,139,.15);color:#94a3b8}
    .pill-active{background:rgba(59,130,246,.15);color:#3b82f6}
    .pill-backup{background:rgba(168,85,247,.15);color:#a855f7}
    /* ---- running pulse ---- */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .running-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1.2s ease-in-out infinite}
    /* ---- section header ---- */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .page-title{font-size:1.1rem;font-weight:600}
    /* ---- toast ---- */
    #toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:.875rem;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:999;transform:translateY(80px);opacity:0;transition:.3s}
    #toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    codex token 维护中心
    <span class="badge">WebUI</span>
  </div>
  <div id="running-indicator" style="display:none;align-items:center;gap:8px;font-size:.85rem;color:var(--accent)">
    <span class="running-dot"></span> 运行中…
  </div>
</header>
<main>
  <aside>
    <div class="nav-item active" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      仪表盘
    </div>
    <div class="nav-item" data-page="tokens">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Token 列表
    </div>
    <div class="nav-item" data-page="config">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      配置
    </div>
    <div class="nav-item" data-page="logs">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      运行日志
    </div>
  </aside>

  <!-- ===== DASHBOARD ===== -->
  <section class="page active" id="page-dashboard">
    <div class="page-header">
      <div class="page-title">仪表盘</div>
      <div class="btn-row" style="margin-bottom:0">
        <button class="btn-ghost" onclick="refreshStatus()" id="btn-refresh">↻ 刷新</button>
        <button class="btn-primary" id="btn-run" onclick="triggerRun()">▶ 立即执行</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Token 总览</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">活跃 Token</div><div class="stat-value acc" id="stat-active">—</div></div>
        <div class="stat"><div class="stat-label">备份 Token</div><div class="stat-value warn" id="stat-backup">—</div></div>
        <div class="stat"><div class="stat-label">上次 OK</div><div class="stat-value ok" id="stat-ok">—</div></div>
        <div class="stat"><div class="stat-label">401 已删</div><div class="stat-value err" id="stat-401">—</div></div>
        <div class="stat"><div class="stat-label">402 已移</div><div class="stat-value warn" id="stat-402">—</div></div>
        <div class="stat"><div class="stat-label">上次新增</div><div class="stat-value acc" id="stat-added">—</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">上次运行摘要</div>
      <div id="summary-box" style="color:var(--mute);font-size:.85rem">尚未运行</div>
    </div>
  </section>

  <!-- ===== TOKENS ===== -->
  <section class="page" id="page-tokens">
    <div class="page-header">
      <div class="page-title">Token 列表</div>
      <button class="btn-ghost" onclick="loadTokens()">↻ 刷新</button>
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>文件名</th><th>Account ID</th><th>状态</th></tr></thead>
          <tbody id="token-tbody"><tr><td colspan="3" style="color:var(--mute);text-align:center;padding:24px">加载中…</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ===== CONFIG ===== -->
  <section class="page" id="page-config">
    <div class="page-header">
      <div class="page-title">配置</div>
    </div>
    <form id="config-form" onsubmit="saveConfig(event)">
      <!-- GitHub -->
      <div class="card">
        <div class="card-title">GitHub 仓库</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>REPO_LIST（多个用逗号分隔，例如 owner/repo1,owner/repo2）</label>
            <input type="text" name="repo_list" placeholder="owner/repo" />
          </div>
        </div>
      </div>

      <!-- 目录 -->
      <div class="card">
        <div class="card-title">目录配置</div>
        <div class="form-grid">
          <div class="form-group">
            <label>AUTH_DIR（活跃 Token 目录）</label>
            <input type="text" name="auth_dir" placeholder="/data/auths" />
          </div>
          <div class="form-group">
            <label>BACKUP_DIR（备份/额度耗尽 Token 目录）</label>
            <input type="text" name="backup_dir" placeholder="/data/auths_backup" />
          </div>
        </div>
      </div>

      <!-- age 加密 -->
      <div class="card">
        <div class="card-title">age 加密</div>
        <div class="form-grid">
          <div class="form-group full">
            <div class="checkbox-row">
              <input type="checkbox" name="use_age" id="use_age_cb" />
              <label for="use_age_cb" style="cursor:pointer">启用 age 解密（USE_AGE=1，Release 资产为 .zip.age）</label>
            </div>
          </div>
          <div class="form-group full">
            <label>AGE_IDENTITY 私钥路径（仅 USE_AGE=1 时需要）</label>
            <input type="text" name="age_identity_path" placeholder="/data/age.key" />
          </div>
        </div>
      </div>

      <!-- CPA -->
      <div class="card">
        <div class="card-title">CPA 配置</div>
        <div class="form-grid">
          <div class="form-group">
            <label>CPA API 基础 URL</label>
            <input type="text" name="cpa_api_url" placeholder="http://localhost:3000" />
          </div>
          <div class="form-group">
            <label>CPA Token（Bearer）</label>
            <input type="password" name="cpa_token" placeholder="••••••••" />
          </div>
          <div class="form-group">
            <label>Auth 路径（主）</label>
            <input type="text" name="cpa_auth_url" placeholder="/api/reload" />
          </div>
          <div class="form-group">
            <label>Auth 路径（备用）</label>
            <input type="text" name="cpa_auth_fallback_url" placeholder="/api/reload-fallback" />
          </div>
        </div>
      </div>

      <!-- Telegram -->
      <div class="card">
        <div class="card-title">Telegram 通知（可选）</div>
        <div class="form-grid">
          <div class="form-group">
            <label>TG_BOT_TOKEN</label>
            <input type="password" name="tg_bot_token" placeholder="123456:AA…" />
          </div>
          <div class="form-group">
            <label>TG_CHAT_ID</label>
            <input type="text" name="tg_chat_id" placeholder="1234567890" />
          </div>
        </div>
      </div>

      <!-- 运行参数 -->
      <div class="card">
        <div class="card-title">运行参数</div>
        <div class="form-grid">
          <div class="form-group">
            <label>MAX_PER_RUN（每个 repo 单次最多处理几个 release）</label>
            <input type="number" name="max_per_run" min="1" max="200" />
          </div>
          <div class="form-group">
            <label>SLEEP_SEC（扫描节流间隔，秒）</label>
            <input type="number" name="sleep_sec" step="0.1" min="0" max="5" />
          </div>
          <div class="form-group">
            <label>TIMEOUT_SEC（请求超时，秒）</label>
            <input type="number" name="timeout_sec" min="3" max="60" />
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn-primary">保存配置</button>
        <button type="button" class="btn-ghost" onclick="loadConfig()">重置</button>
      </div>
    </form>
  </section>

  <!-- ===== LOGS ===== -->
  <section class="page" id="page-logs">
    <div class="page-header">
      <div class="page-title">运行日志</div>
      <button class="btn-ghost" onclick="loadLogs()">↻ 刷新</button>
    </div>
    <div class="card" style="padding:0">
      <div id="log-file-name" style="padding:10px 16px;font-size:.78rem;color:var(--mute);border-bottom:1px solid var(--border)"></div>
      <div class="log-box" id="log-box">加载中…</div>
    </div>
  </section>
</main>

<div id="toast"></div>

<script>
// ---- Nav ----
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-' + el.dataset.page).classList.add('active');
    if (el.dataset.page === 'tokens') loadTokens();
    if (el.dataset.page === 'logs') loadLogs();
  });
});

// ---- Toast ----
function toast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ---- Status ----
async function refreshStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    document.getElementById('stat-active').textContent = data.auth_count ?? '—';
    document.getElementById('stat-backup').textContent = data.backup_count ?? '—';
    document.getElementById('running-indicator').style.display = data.is_running ? 'flex' : 'none';
    document.getElementById('btn-run').disabled = data.is_running;

    const s = data.last_run_summary;
    if (s) {
      document.getElementById('stat-ok').textContent = s.ok ?? '—';
      document.getElementById('stat-401').textContent = s.deleted_401 ?? '—';
      document.getElementById('stat-402').textContent = s.moved_402 ?? '—';
      document.getElementById('stat-added').textContent = s.added ?? '—';

      document.getElementById('summary-box').innerHTML =
        `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;font-size:.85rem">
          ${Object.entries(s).map(([k,v]) => `<div style="display:flex;gap:6px"><span style="color:var(--mute)">${k}:</span><span>${v}</span></div>`).join('')}
        </div>`;
    }
  } catch(e) { console.warn(e); }
}

// ---- Trigger run ----
async function triggerRun() {
  document.getElementById('btn-run').disabled = true;
  try {
    const res = await fetch('/api/run', { method: 'POST' });
    const data = await res.json();
    toast(data.message || '已触发');
    document.getElementById('running-indicator').style.display = 'flex';
    pollStatus();
  } catch(e) {
    toast('触发失败：' + e);
    document.getElementById('btn-run').disabled = false;
  }
}

function pollStatus() {
  const interval = setInterval(async () => {
    await refreshStatus();
    const res = await fetch('/api/status');
    const data = await res.json();
    if (!data.is_running) {
      clearInterval(interval);
      toast('运行完成！');
    }
  }, 2000);
}

// ---- Tokens ----
async function loadTokens() {
  const tbody = document.getElementById('token-tbody');
  tbody.innerHTML = '<tr><td colspan="3" style="color:var(--mute);text-align:center;padding:24px">加载中…</td></tr>';
  try {
    const res = await fetch('/api/tokens');
    const data = await res.json();
    const rows = [
      ...data.active.map(t => `<tr><td>${t.name}</td><td style="color:var(--mute);font-size:.8rem">${t.account_id||'—'}</td><td><span class="pill pill-active">活跃</span></td></tr>`),
      ...data.backup.map(t => `<tr><td>${t.name}</td><td style="color:var(--mute);font-size:.8rem">${t.account_id||'—'}</td><td><span class="pill pill-backup">备份</span></td></tr>`),
    ];
    tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="3" style="color:var(--mute);text-align:center;padding:24px">暂无 Token</td></tr>';
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="3" style="color:var(--red);text-align:center;padding:24px">加载失败: ${e}</td></tr>`;
  }
}

// ---- Config ----
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    const data = await res.json();
    const form = document.getElementById('config-form');
    Object.entries(data).forEach(([k, v]) => {
      const el = form.elements[k];
      if (!el) return;
      if (el.type === 'checkbox') el.checked = !!v;
      else el.value = v ?? '';
    });
  } catch(e) { toast('加载配置失败'); }
}

async function saveConfig(e) {
  e.preventDefault();
  const form = document.getElementById('config-form');
  const fd = new FormData(form);
  const body = {};
  for (const [k, v] of fd.entries()) body[k] = v;
  // checkboxes not in formdata when unchecked
  ['use_age'].forEach(k => { if (!(k in body)) body[k] = false; else body[k] = true; });
  body.max_per_run = parseInt(body.max_per_run) || 20;
  body.sleep_sec = parseFloat(body.sleep_sec) || 0.2;
  body.timeout_sec = parseInt(body.timeout_sec) || 12;
  try {
    const res = await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.ok) toast('✓ 配置已保存');
    else toast('保存失败');
  } catch(e) { toast('保存失败: ' + e); }
}

// ---- Logs ----
async function loadLogs() {
  const box = document.getElementById('log-box');
  try {
    const res = await fetch('/api/logs');
    const data = await res.json();
    document.getElementById('log-file-name').textContent = data.file ? '文件：' + data.file : '';
    box.textContent = (data.lines || []).join('\n') || '（暂无日志）';
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    box.textContent = '加载失败: ' + e;
  }
}

// ---- Init ----
loadConfig();
refreshStatus();
setInterval(refreshStatus, 10000);
</script>
</body>
</html>
